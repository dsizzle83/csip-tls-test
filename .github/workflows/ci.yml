name: CI

# TASK-003: build every sim/dashboard binary, run the fast unit suites, the
# southbound suites, the QA-harness unit gate, and the protocol/conformance
# logic tests on every PR and push to main.
#
# Two jobs, split on the verified cgo boundary (grep -rl 'internal/wolfssl'
# --include='*.go' .; grep -rl 'internal/tlsclient' --include='*.go' .):
#   - pure-go:  everything that is CGO_ENABLED=0 clean. Builds every pure-Go
#               sim/dashboard binary, vets them, and runs the southbound,
#               QA-harness unit-gate, and ./tests/ conformance-logic suites.
#               Verified locally (2026-07-04): `go test ./tests/` and the
#               qa-regression unit gate need no cert fixtures — the only
#               tests in those packages that touch testdata/certs are all
#               `//go:build integration`-tagged and excluded by default.
#   - cgo-fast: caches a wolfSSL 5.7.6-stable build (identical recipe to
#               TASK-002 / sim_gridsim.txt Step 1), then runs `make
#               test-fast` (needs the cgo sysroot even though the TLS
#               handshake tests inside it are integration-tagged, because
#               internal/tlsclient itself is a cgo package) and builds the
#               three cgo binaries (sim/server, sim/client, sim/conformance).
#
# Explicitly OUT of scope for hosted CI (bench-touching / hardware-in-the-
# loop): `make test-integration` (real mTLS handshakes), `scripts/run-
# conformance.sh`, `make qa-bench`, `scripts/mayhem.py --dashboard ...`, and
# anything addressing 69.0.0.x. If bench-in-the-loop CI is ever wanted, the
# designated home is a self-hosted runner labelled [self-hosted, desktop]
# (the desktop already carries the wolfSSL sysroot at ~/.local/wolfssl-amd64
# and LAN access to the Pis) — not a hosted runner.
#
# cmd/hub (the obsolete monolith) and its forked orchestrator/bridge were
# deleted in TASK-010; the hub build lives in ~/projects/lexa-hub.
#
# TASK-005: `vulncheck` job runs a pinned govulncheck (scripts/ci/govulncheck.sh)
# on every PR/push AND nightly (new CVEs land without a code change). It reuses
# the cgo-fast job's wolfSSL cache/build steps — govulncheck needs the whole
# module to *build* (cgo packages included) or it silently scans less than you
# think. Required (blocking) as of TASK-006: the dependency refresh
# (x/crypto, x/net, x/sys) cleared this repo's baseline to 0 Called and 0
# informational findings — see docs/refactor/VULN_BASELINE_2026-07-04.md and
# its TASK-006 addendum.
#
# TASK-024: `proto-pin` job replaces TASK-004's report-only `lockstep` job
# (byte-diffing internal/southbound/sunspec and internal/ocppserver against
# lexa-hub). Both trees are now gone from both repos — TASK-020-023 moved
# them into the shared `lexa-proto` module (sunspec, derbase, modbus,
# ocppserver, csipmodel; AD-003) — so a tree-diff would compare nothing and
# be green by vacuity. The real MTR-4 lockstep question now is version skew:
# do the two consumer repos require the SAME lexa-proto commit? `proto-pin`
# compares each repo's committed `proto.pin` (the interim pinning mechanism,
# AD-003(c) — lexa-proto isn't hosted yet, so a go.mod pseudo-version
# comparison isn't possible) and fails on mismatch. See
# scripts/check-proto-pin.sh for the full mechanics (including the
# desktop-only `--verify-vendor` deep check).
#
# The two repos are both private under the same owner, so the default
# GITHUB_TOKEN cannot read lexa-hub for the second checkout — this job uses
# a fine-grained PAT stored as repo secret LEXA_HUB_RO_TOKEN (same secret
# TASK-004's lockstep job used):
#   Scope: read-only, "Contents" permission, restricted to the single repo
#   dsizzle83/lexa-hub. No other repos, no other permissions.
#   Expiry: set at creation (GitHub fine-grained PATs require an expiry);
#   rotate before it lapses or this job starts failing on checkout, not on
#   an actual pin mismatch — check the failure message before assuming drift.
#
# lexa-hub's CI runs the mirror-image job (checks out csip-tls-test via a new
# CSIP_TLS_TEST_RO_TOKEN secret, invokes the checked-out copy of this same
# script) — TASK-004's lockstep job was one-sided (only csip-tls-test's CI
# ran it), which is exactly the "asymmetric bump" gap TASK-024 closes; both
# repos must gate on the pin now.
#
# Enforcing (not report-only): any pin mismatch fails the job. There is no
# allowlist — a lockstep gate that ships known-differences-forever is the
# W3 failure mode repeating; the two repos are either pinned identically or
# the gate is red.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * *' # nightly vuln scan (UTC); see `vulncheck` job below

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# TASK-019 committed a go.work (`use (. ../lexa-proto)`) for local dev against
# the in-progress shared module, with GOWORK=off set here because hosted
# runners never have a `../lexa-proto` sibling. TASK-024 removes go.work from
# version control (AD-003(d)/(e)): the build now goes through the committed
# `require lexa-proto v0.0.0` + `replace lexa-proto => ../lexa-proto` +
# vendor/lexa-proto/ in go.mod, which Go auto-selects (`-mod=vendor`) whenever
# vendor/modules.txt is present and consistent — no GOWORK setting needed for
# that to work, and none exists to turn off since the file isn't committed.
# Developers may still keep an untracked local go.work (gitignored) for
# cross-repo dev against a live ../lexa-proto checkout; it never reaches CI.
jobs:
  pure-go:
    name: pure-go
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build sim + dashboard binaries (pure Go)
        run: |
          go build ./sim/modsim ./sim/batsim ./sim/metersim ./sim/evsim \
            ./sim/modsim-client ./sim/modsim-conformance ./sim/httpsim \
            ./cmd/dashboard ./cmd/mqttproxy

      - name: Vet (pure-Go package set + southbound)
        run: |
          go vet ./sim/modsim ./sim/batsim ./sim/metersim ./sim/evsim \
            ./sim/modsim-client ./sim/modsim-conformance ./sim/httpsim \
            ./cmd/dashboard ./cmd/mqttproxy \
            ./sim/southbound/... ./internal/southbound/...

      - name: Southbound unit tests
        run: go test ./internal/southbound/...

      - name: csipref referee unit tests (walker/scheduler + TASK-048 fuzz seeds)
        # internal/csipref (discovery + scheduler) has never had a direct
        # `go test` step of its own in this job — go test ./tests/ below
        # exercises it only indirectly through the conformance suites, so
        # its own _test.go files (walker_test.go, scheduler_test.go,
        # helpers_test.go, and now fuzz_test.go's seed-mode cases) were not
        # actually running in CI. Adding this step closes that gap and is
        # what makes TASK-048's "PR-lane seed checks add <5s" acceptance
        # criterion true rather than aspirational (seed-only mode: plain
        # `go test`, no -fuzz, runs each Fuzz func's f.Add seeds as regular
        # subtests — verified locally at a few ms, not seconds).
        run: go test ./internal/csipref/...

      - name: QA-harness unit gate (scripts/qa-regression.sh)
        run: bash scripts/qa-regression.sh

      - name: Conformance logic tests (go test ./tests/)
        run: go test -count=1 ./tests/

  cgo-fast:
    name: cgo-fast
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    env:
      WOLFSSL_VERSION: "5.7.6-stable"
      WOLFSSL_SYSROOT: /home/runner/wolfssl-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache wolfSSL ${{ env.WOLFSSL_VERSION }} sysroot
        id: cache-wolfssl
        uses: actions/cache@v4
        with:
          path: ${{ env.WOLFSSL_SYSROOT }}
          key: wolfssl-${{ env.WOLFSSL_VERSION }}-${{ runner.os }}-v1

      - name: Install wolfSSL build toolchain
        if: steps.cache-wolfssl.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y gcc cmake automake autoconf libtool

      - name: Build + install wolfSSL ${{ env.WOLFSSL_VERSION }} (cache miss only)
        if: steps.cache-wolfssl.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd /tmp
          wget -q "https://github.com/wolfSSL/wolfssl/archive/refs/tags/v${WOLFSSL_VERSION}.tar.gz" \
            -O wolfssl.tar.gz
          tar xzf wolfssl.tar.gz
          cd "wolfssl-${WOLFSSL_VERSION}"
          autoreconf -i
          mkdir -p /tmp/wolfssl-build
          cd /tmp/wolfssl-build
          "/tmp/wolfssl-${WOLFSSL_VERSION}/configure" \
            --prefix="$WOLFSSL_SYSROOT" \
            --enable-tls13 --enable-aesccm --enable-tlsx \
            --enable-certgen --enable-opensslall \
            --enable-static --disable-shared \
            --disable-examples --disable-crypttests
          make -j"$(nproc)"
          make install prefix="$WOLFSSL_SYSROOT"

      - name: "Export cgo flags (static libwolfssl.a needs -lm: pow/log in dh.c)"
        run: |
          echo "CGO_CFLAGS=-I${WOLFSSL_SYSROOT}/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L${WOLFSSL_SYSROOT}/lib -lm" >> "$GITHUB_ENV"

      - name: make test-fast (cgo compiles; TLS-handshake tests inside stay integration-tagged)
        run: make test-fast WOLFSSL_SYSROOT="$WOLFSSL_SYSROOT"

      - name: Build cgo binaries (sim/server, sim/client, sim/conformance)
        run: go build ./sim/server ./sim/client ./sim/conformance

  # TASK-005: pinned govulncheck (scripts/ci/govulncheck.sh) + triage
  # allowlist (scripts/ci/vuln-allowlist.txt). Reuses the cgo-fast wolfSSL
  # cache/build steps — govulncheck must build the whole module (cgo
  # packages included) or it silently scans a shrunken package set. Gates
  # only on REACHABLE findings (real call path, not merely imported or
  # transitively required); everything else is informational. Runs on PR,
  # push:main, and the nightly cron (new CVEs land with no code change).
  # Required (blocking) as of TASK-006 — the dependency refresh cleared the
  # baseline to 0 Called findings; see docs/refactor/VULN_BASELINE_2026-07-04.md.
  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    env:
      WOLFSSL_VERSION: "5.7.6-stable"
      WOLFSSL_SYSROOT: /home/runner/wolfssl-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache wolfSSL ${{ env.WOLFSSL_VERSION }} sysroot
        id: cache-wolfssl
        uses: actions/cache@v4
        with:
          path: ${{ env.WOLFSSL_SYSROOT }}
          key: wolfssl-${{ env.WOLFSSL_VERSION }}-${{ runner.os }}-v1

      - name: Install wolfSSL build toolchain
        if: steps.cache-wolfssl.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y gcc cmake automake autoconf libtool

      - name: Build + install wolfSSL ${{ env.WOLFSSL_VERSION }} (cache miss only)
        if: steps.cache-wolfssl.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd /tmp
          wget -q "https://github.com/wolfSSL/wolfssl/archive/refs/tags/v${WOLFSSL_VERSION}.tar.gz" \
            -O wolfssl.tar.gz
          tar xzf wolfssl.tar.gz
          cd "wolfssl-${WOLFSSL_VERSION}"
          autoreconf -i
          mkdir -p /tmp/wolfssl-build
          cd /tmp/wolfssl-build
          "/tmp/wolfssl-${WOLFSSL_VERSION}/configure" \
            --prefix="$WOLFSSL_SYSROOT" \
            --enable-tls13 --enable-aesccm --enable-tlsx \
            --enable-certgen --enable-opensslall \
            --enable-static --disable-shared \
            --disable-examples --disable-crypttests
          make -j"$(nproc)"
          make install prefix="$WOLFSSL_SYSROOT"

      - name: "Export cgo flags (static libwolfssl.a needs -lm: pow/log in dh.c)"
        run: |
          echo "CGO_CFLAGS=-I${WOLFSSL_SYSROOT}/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L${WOLFSSL_SYSROOT}/lib -lm" >> "$GITHUB_ENV"

      - name: govulncheck (pinned, reachable-findings gate)
        run: |
          set -o pipefail
          bash scripts/ci/govulncheck.sh 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

  # TASK-024: shared-module version-pin gate (AD-003(c)), replaces TASK-004's
  # report-only lockstep-divergence job. See the header comment above `on:`
  # for the PAT/secret rationale and scripts/check-proto-pin.sh for the full
  # mechanics.
  proto-pin:
    name: proto-pin
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout csip-tls-test (bench, this repo)
        uses: actions/checkout@v4

      - name: Checkout lexa-hub (product) read-only
        uses: actions/checkout@v4
        with:
          repository: dsizzle83/lexa-hub
          token: ${{ secrets.LEXA_HUB_RO_TOKEN }}
          path: lexa-hub

      - name: proto.pin version-pin check (fails on mismatch — no allowlist)
        run: bash scripts/check-proto-pin.sh --self . --product lexa-hub --no-proto-check

  # TASK-048: nightly go-native fuzzing of the client-side IEEE 2030.5 XML
  # unmarshal entry points in internal/csipref/discovery — this repo's own
  # (deliberately independent, AD-003(f)) walker's decode step, into the
  # shared lexa-proto/csipmodel types. Same job shape as lexa-hub's TASK-047
  # httpwire fuzz job and this repo's own `vulncheck` job above: nightly-only
  # (`if: github.event_name == 'schedule'`, same cron as vulncheck), no cgo
  # needed (csipmodel/csipref import nothing beyond encoding/xml + stdlib —
  # unlike cgo-fast above, this never touches wolfSSL). A crasher found here
  # writes a regression file under
  # internal/csipref/discovery/testdata/fuzz/<FuzzName>/, which every
  # subsequent `go test` (no -fuzz) reruns as a normal test case; the
  # artifact upload is a convenience for grabbing that file out of a run
  # nobody was watching live.
  fuzz:
    name: fuzz (nightly, 2030.5 XML decode)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: fuzz csipref XML decode (15m/target, no cgo)
        run: |
          set -o pipefail
          go test -fuzz=FuzzUnmarshalDeviceCapability -fuzztime=15m ./internal/csipref/discovery/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          go test -fuzz=FuzzUnmarshalDERControlList   -fuzztime=15m ./internal/csipref/discovery/ 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: upload crashers (only present on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: csipref-fuzz-crashers
          path: internal/csipref/discovery/testdata/fuzz/*/
          if-no-files-found: ignore
